name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate package source
        run: python scripts\validate_package.py

      - name: Check PowerShell scripts
        shell: pwsh
        run: |
          [scriptblock]::Create((Get-Content -Raw encode_timelapse.ps1)) | Out-Null
          [scriptblock]::Create((Get-Content -Raw scripts\build_extension.ps1)) | Out-Null

      - name: Build source zip
        run: python scripts\build_extension_zip.py
